name: 42-smoke-test.yml

# This workflow runs a smoke test on the application using the docker-compose file in .devcontainer/production/docker-compose.yml.
# It uses the files under the .devcontainer/production directory to run the test, so changes to those files will trigger this workflow.

on:
  workflow_dispatch:
  pull_request:
    paths: [ src/**, pom.xml, lombok.config, frontend/**, .github/workflows/42-smoke-test.yml, .devcontainer/** ]
  push:
    branches: [ main ]
    paths: [ src/**, pom.xml, lombok.config, frontend/**, .github/workflows/42-smoke-test.yml, .devcontainer/** ]

jobs:
  smoke-test:
    uses: ucsb-cs156/workflows/.github/workflows/42-smoke-test.yml@main
    with:
      compose-location: .devcontainer/production/docker-compose.yml
      
