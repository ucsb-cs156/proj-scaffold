name: "82-kanban-slack-update.yml"

# Instructions to set up the workflow can be found here:
# <https://ucsb-cs156.github.io/topics/github_actions/workflow_82.html>

on:
  schedule:
    - cron: "0 0,4 * * 3-5"  # 0,4 UTC are 4pm, 8pm Pacific Standard Time on T W R
    - cron: "0 0 * * 1,2,6,0" # runs at 4pm on M F SS
  workflow_dispatch:  # Allows manual triggering

env:
  PAT: ${{ secrets.CLASSIC_PAT }}
  GH_TOKEN: ${{ secrets.CLASSIC_PAT }}
  ORG_NAME: ${{ github.repository_owner }}
  REPO_NAME: ${{ github.event.repository.name }}
  # The columns in the Kanban board that we are interested in
  COLUMNS: "Todo, In Progress, In Review, Done"
  START_DATE: "2026-05-13"
  END_DATE: "2026-05-30"  # Set the end date for the workflow

jobs:

  # This job checks if the current date is before the END_DATE
  check_date:
    name: Check Date
    runs-on: ubuntu-latest
    outputs:
      continue: ${{ steps.check_date.outputs.continue }}
    steps:
      - name: Check if current date is before END_DATE
        id: check_date
        run: |
          current_date=$(date +%Y-%m-%d)
          end_date="${{ env.END_DATE }}"
          start_date="${{ env.START_DATE }}"
          
          if [[ "$current_date" > "$end_date" ]]; then
            echo "Current date is after $end_date. Stopping workflow."
            echo "continue=false" >> "$GITHUB_OUTPUT"
          else
            echo "Current date is before $end_date. Continuing workflow."
            echo "continue=true" >> "$GITHUB_OUTPUT"
          fi
          if [[ "$current_date" < "$start_date" ]]; then
            echo "Current date is before $start_date. Stopping workflow."
            echo "continue=false" >> "$GITHUB_OUTPUT"
          fi
          
          OWNER=${{ github.repository_owner }}
          OWNER_PLUS_REPOSITORY=${{github.repository}}
          REPOSITORY=${OWNER_PLUS_REPOSITORY/$OWNER\//}  
          if [[ "$OWNER" == "ucsb-cs156" ]]; then
            echo "This workflow should not run on repos in the ucsb-cs156 organization"
            echo "continue=false" >> "$GITHUB_OUTPUT"
          fi
          if [[ "$REPOSITORY" == STARTER* ]]; then
            echo "This workflow should not run on STARTER repos"
            echo "continue=false" >> "$GITHUB_OUTPUT"
          fi
          if [[ -f "$GITHUB_OUTPUT" ]]; then
            echo "Contents of $GITHUB_OUTPUT:"
            cat "$GITHUB_OUTPUT"
          fi
        
  # This job extracts the team name from the repository name
  # The team name is used to find the project ID for the team
  # It does this by extracting the last 6 characters of the repository name
  # Then sets the team name as an output for the next job
  get_team_name:
    name: Get Team Name and Repository Name
    runs-on: ubuntu-latest
    needs: check_date
    if: needs.check_date.outputs.continue == 'true'
    outputs:
      team: ${{ steps.find_team.outputs.team }}
      repository: ${{ steps.find_team.outputs.repository }}
    steps:
      - name: Extract Team Name from Repo
        id: find_team
        run: |
          REPO=${{ github.repository }}
          TEAM_NAME="${REPO: -6}"

          OWNER_PLUS_REPOSITORY=${{github.repository}}
          OWNER=${{ github.repository_owner }}
          REPOSITORY=${OWNER_PLUS_REPOSITORY/$OWNER\//}  

          echo "repository=${REPOSITORY}" >> "$GITHUB_OUTPUT"
          echo "team=${TEAM_NAME}" >> "$GITHUB_OUTPUT"
          
  # This job finds the project ID for the team based on the team name
  # It finds the last updated project that contains the team name in the title
  # Then sets the project ID as an output for the next job
  get_project_id:
    name: Find Project ID that matches the repo name
    runs-on: ubuntu-latest
    needs: get_team_name
    if: needs.check_date.outputs.continue == 'true'
    outputs:
      project_id: ${{ steps.find_project.outputs.project_id }}
      project_data: ${{ steps.output_query.outputs.project_data }}
      issue_counts: ${{ steps.count_issues.outputs.issue_counts }}
    env:
      REPOSITORY: ${{ needs.get_team_name.outputs.repository }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Debugging Output
        run: |
          echo "needs.get_team_name.outputs.team=${{needs.get_team_name.outputs.team}}"
          echo "needs.get_team_name.outputs.repository=${{needs.get_team_name.outputs.repository}}"
          echo "github.repository_owner=${{ github.repository_owner }}"
      - name: Fetch Project Id using gh
        id: find_project_gh
        run: |
          # -e: exit immediately if any command fails (non-zero), instead of continuing
          # -u: treat unset variables as errors to catch typos/missing env vars
          # -o pipefail: pipelines fail if any command in the pipe fails (not just the last)
          set -euo pipefail

          ORG_LOGIN="${{ github.repository_owner }}"
          PROJECT_TITLE=${{ needs.get_team_name.outputs.repository }}

          # Query first 100 projects; paginate if you might have more than 100.
          PROJECT_ID="$(
            gh api graphql -f query='
              query($org: String!, $first: Int!) {
                organization(login: $org) {
                  projectsV2(first: $first) {
                    nodes { id title }
                  }
                }
              }' \
              -f org="$ORG_LOGIN" \
              -F first=100 \
              --jq ".data.organization.projectsV2.nodes[] | select(.title == \"$PROJECT_TITLE\") | .id"
          )"

          if [[ -z "${PROJECT_ID}" ]]; then
            echo "ERROR: No project titled '$PROJECT_TITLE' found in org '$ORG_LOGIN'." >&2
            exit 1
          fi

          echo "PROJECT_ID=$PROJECT_ID"
          echo "$PROJECT_ID" >> project_id.txt
          ls project_id.txt
          cat project_id.txt
          pwd  

       
      - name: Output GraphQL Query Result
        id: output_query
        env:
          PAT: ${{ secrets.CLASSIC_PAT }}
        run: |
          ls
          PROJECT_ID=$(cat project_id.txt)
          GQL_QUERY="{ node(id: \"$PROJECT_ID\") { ... on ProjectV2 { items(first: 100) { nodes { id fieldValues(first: 100) { nodes { ... on ProjectV2ItemFieldSingleSelectValue { field { ... on ProjectV2Field { name } } name } ... on ProjectV2ItemFieldTextValue { field { ... on ProjectV2Field { name } } text } } } content { ... on Issue { title assignees(first: 10) { nodes { login } } } ... on PullRequest { title assignees(first: 10) { nodes { login } } } } } } } } }"
          QUERY=$(jq -nc --arg q "$GQL_QUERY" '{"query": $q}')
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $PAT" \
            -H "Content-Type: application/json" \
            -d "$QUERY" \
            https://api.github.com/graphql)
          echo "$RESPONSE"
          echo "project_data=$RESPONSE" >> "$GITHUB_OUTPUT"
          echo "$RESPONSE" >> project_data.json
          ls project_data.json
          cat project_data.json

      - name: Count Issues by Column and Assignee
        id: count_issues
        shell: python
        env:
          columns: ${{ env.COLUMNS }}
        run: |
          import json
          import os
          with open('project_data.json', 'r') as f:
              data = json.load(f)

          issue_counts = {}
          columns = [c.strip() for c in os.environ.get('columns', '').split(',')]

          for item in data['data']['node']['items']['nodes']:
              column_field = next(
                  (n for n in item['fieldValues']['nodes'] if n.get('name') in columns),
                  None
              )
              if column_field is not None:
                  column = column_field.get('name')
                  if column is not None:
                      assignees = [n['login'] for n in item['content'].get('assignees', {}).get('nodes', [])]
                      if not assignees:
                          assignees = ['UNASSIGNED']
                      for assignee in assignees:
                          if column not in issue_counts:
                              issue_counts[column] = {}
                          if assignee not in issue_counts[column]:
                              issue_counts[column][assignee] = 0
                          issue_counts[column][assignee] += 1

          issue_counts_json = json.dumps(issue_counts, indent=2)
          with open('issue_counts.json', 'w') as f:
              f.write(issue_counts_json)
          print("Issue count process completed")      
      - name: Display issue_counts.json for debugging
        run: |
          echo "Contents of issue_counts.json:"
          cat issue_counts.json
      - name: Upload issue counts
        uses: actions/upload-artifact@v6
        with:
          name: issue_counts
          path: issue_counts.json
          overwrite: true



  # This job generates an ASCII table from the issue counts
  # It does this by parsing the issue counts JSON and formatting it into an ASCII table
  # Then sets the ASCII table as an output for the next job
  # Also uploads the ASCII table as an artifact for debugging
  generate_ascii_table:
    name: Generate ASCII Table
    runs-on: ubuntu-latest
    needs: get_project_id
    if: needs.check_date.outputs.continue == 'true'
    outputs:
      ascii_table: ${{ steps.generate_table.outputs.ascii_table }}
    steps:
      - name: Download issue counts
        uses: actions/download-artifact@v6
        with:
          name: issue_counts

      - name: Generate ASCII Table
        id: generate_table
        shell: python
        env:
          columns: ${{ env.COLUMNS }}
        run: |
          import json
          import os
          import sys

          with open('issue_counts.json', 'r') as f:
              content = f.read()

          if not content.strip():
              print("ISSUE_COUNTS is empty or not set")
              sys.exit(1)

          issue_counts = json.loads(content)

          # Collect all assignees and track unassigned issues
          assignees = {}
          unassigned_counts = {}
          columns = [c.strip() for c in os.environ.get('columns', '').split(',')]

          for column in issue_counts:
              unassigned_counts[column] = 0
              for assignee, count in issue_counts[column].items():
                  if assignee == 'UNASSIGNED':
                      unassigned_counts[column] += count
                  else:
                      if assignee not in assignees:
                          assignees[assignee] = {}
                      assignees[assignee][column] = count

          # Generate the table header with left-aligned text
          header = "| login            |"
          for column in columns:
              header += f" {column[:4]} |"

          # Define the separator with exact dash counts for each column
          separator = "|------------------|"
          for _ in columns:
              separator += "------|"

          # Construct the full table
          table = f"{header}\n{separator}\n"

          # Generate the table rows
          for assignee in assignees:
              row = f"| {assignee[:17]:<17}|"
              for column in columns:
                  count = str(assignees[assignee].get(column, 0))
                  row += f" {count:>4} |"
              table += row + "\n"

          # Add the unassigned row
          unassigned_row = f"| {'UNASSIGNED':<17}|"
          for column in columns:
              count = str(unassigned_counts.get(column, 0))
              unassigned_row += f" {count:>4} |"
          table += unassigned_row + "\n"

          print(f"ASCII Table:\n{table}")
          with open('ascii_table.txt', 'w') as f:
              f.write(table)
   
      - name: Upload ASCII Table
        uses: actions/upload-artifact@v6
        with:
          name: ascii_table
          path: ascii_table.txt
          overwrite: true

  compute_team_to_channel:
    name: Compute Team to Channel Mapping
    runs-on: ubuntu-latest

    # 1) Expose a JOB output so another job can consume it
    outputs:
      TEAM_TO_CHANNEL: ${{ steps.compute_team_to_channel.outputs.TEAM_TO_CHANNEL }}

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      # Compute the JSON once, and publish it in TWO ways:
      #  - to $GITHUB_ENV for later STEPS in this job
      #  - to $GITHUB_OUTPUT for OTHER JOBS (and also steps.*.outputs)
      - name: Compute TEAM_TO_CHANNEL JSON
        id: compute_team_to_channel
        env:
          qxx: s26
          SLACK_BOT_USER_OAUTH_ACCESS_TOKEN: ${{ secrets.SLACK_BOT_USER_OAUTH_ACCESS_TOKEN }}
        run: |
          python -m pip install --upgrade pip
          pip install requests slack_sdk

          python - <<'PY'
          import os
          import json
          from slack_sdk import WebClient
          from slack_sdk.errors import SlackApiError

          def lookupChannels(prefix, token):
            """
            Creates a new public Slack channel with the given name.

            Parameters:
            - channelName (str): The name of the new public channel to be created.
            - token (str): The OAuth token for the Slack API.
            Returns:
            - dict: A dictionary mapping channel names to their corresponding channel IDs.
            """

            client = WebClient(token=token)
            channels = {}
            try:
              # Call the conversations.list method using the WebClient
              result = client.conversations_list(types="public_channel")
              for channel in result["channels"]:
                name = channel["name"]
                if name.startswith(prefix):
                  channels[name] = channel["id"]
            except SlackApiError as e:
              print(f"Error fetching channels: {e.response['error']}")
            return channels

          def get_team_to_channel_id(prefix, token):
            channels = lookupChannels(prefix, token)
            print(f"Channels found with prefix '{prefix}': {channels}")
            return channels
          
          qxx = os.getenv("qxx")
          token = os.environ.get("SLACK_BOT_USER_OAUTH_ACCESS_TOKEN")
          if not token:
              raise EnvironmentError("SLACK_BOT_USER_OAUTH_ACCESS_TOKEN is not set.")

          print(f"Looking up channels with prefix '{qxx}' using provided token of length {len(token)}")    
          d = get_team_to_channel_id(qxx, token)
          json.dump(
            d,
            open("team_to_channel.json", "w"),
            separators=(",", ":")
          )
          PY
       

          TEAM_TO_CHANNEL_JSON=$(cat team_to_channel.json)
          echo "Computed TEAM_TO_CHANNEL JSON: $TEAM_TO_CHANNEL_JSON"
          cat team_to_channel.json

          {
            echo "TEAM_TO_CHANNEL<<EOF"
            echo "$TEAM_TO_CHANNEL_JSON"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
    
  send-to-slack:
    name: Send Report to Slack
    runs-on: ubuntu-latest
    needs: [generate_ascii_table, get_team_name, compute_team_to_channel]
    env:
      TEAM_TO_CHANNEL: ${{ needs.compute_team_to_channel.outputs.TEAM_TO_CHANNEL }}
    if: needs.check_date.outputs.continue == 'true'
    steps:
      - name: Download ASCII Table
        uses: actions/download-artifact@v6
        with:
          name: ascii_table

      - name: Read ASCII Table
        id: read_ascii_table
        run: |
          table=$(cat ascii_table.txt)
          echo "ASCII Table Content:"
          printf "%s\n" "$table"  # Use printf for better handling of multiline text
          echo "$table" > ascii_table_content.txt
          echo "ascii_table_content<<EOF" >> $GITHUB_ENV
          cat ascii_table_content.txt >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
      #This step is used to debug the environment variables and Slack text
      #because the GitHub Actions runner does not support multiline environment variables
      #The ASCII table content is set as an environment variable for use in the Slack message
      #therefore, the ASCII table content is written to a file and then read back to set the environment variable
      #The ASCII table content is also printed for debugging purposes
      - name: Debug Environment Variables
        run: |
          echo "TEAM_TO_CHANNEL: ${{ env.TEAM_TO_CHANNEL }}"
          echo "ORG_NAME: ${{ env.ORG_NAME }}"
          echo "Slack Channel: ${{ fromJSON(env.TEAM_TO_CHANNEL)[needs.get_team_name.outputs.team] }}"
          echo "ASCII Table:"
          cat ascii_table_content.txt
      #This step is used to debug the Slack text that will be sent to the Slack channel
      - name: Debug Slack Text
        run: |
          table=$(cat ascii_table.txt)
          echo "Slack Text:"
          printf "📋 *Kanban Board Status* ✔️\n"
          printf '```\n%s\n```\n' "$table"
      #This step sends the report to the Slack channel associated with the team
      - name: Send Report to Slack
        uses: archive/github-actions-slack@v2.9.0
        with:
          slack-bot-user-oauth-access-token: ${{ secrets.SLACK_BOT_USER_OAUTH_ACCESS_TOKEN }}
          slack-channel: ${{ fromJSON(env.TEAM_TO_CHANNEL)[needs.get_team_name.outputs.team] }}
          slack-text: |
            📋 *Kanban Board Status* ✔️ (${{ github.event.repository.name }})
            ```
            ${{ env.ascii_table_content }}
            ```
