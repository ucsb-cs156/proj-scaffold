# H2 file-based datasource for local development (no Postgres required)
spring.datasource.url=jdbc:h2:file:./target/db-development
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.******

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Enable the H2 web console at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.settings.web-allow-others=false

logging.level.edu.ucsb.cs.scaffold=DEBUG
