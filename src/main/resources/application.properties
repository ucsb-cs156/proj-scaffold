# Active Spring profile is set by Maven at build time via the @springProfiles@ placeholder.
# localhost profile -> development (H2)
# production profile -> production (PostgreSQL)
spring.profiles.active=@springProfiles@

# Server port
server.port=${PORT:8080}

# Use Ant-style path matching so that FrontendController's /**/{path:[^\\.]*}
# pattern works correctly (same convention as proj-happycows)
spring.mvc.pathmatch.matching-strategy=ANT_PATH_MATCHER

# JPA / Hibernate – common settings (datasource is in profile-specific files)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# PrairieLearn API
pl.api.token=${PL_API_TOKEN:}
pl.api.base=https://us.prairielearn.com/pl/api/v1
pl.course.instance.id=${PL_COURSE_INSTANCE_ID:213859}

# CORS – set CORS_ALLOWED_ORIGINS to restrict to specific domains in production
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# Swagger / SpringDoc
springdoc.swagger-ui.tryItOutEnabled=true
