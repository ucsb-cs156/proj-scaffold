# Active Spring profile is set by Maven at build time via the @springProfiles@ placeholder.
# localhost profile -> development (H2)
# production profile -> production (PostgreSQL)
spring.profiles.active=@springProfiles@

# Server port
server.port=${PORT:8080}

# Use Ant-style path matching so that FrontendController's /**/{path:[^\\.]*}
# pattern works correctly (same convention as proj-happycows)
spring.mvc.pathmatch.matching-strategy=ANT_PATH_MATCHER

# JPA / Hibernate – common settings (datasource is in profile-specific files)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.liquibase.change-log=db/migration/changelog-master.json

# PrairieLearn API
pl.api.token=${PL_API_TOKEN:}
pl.api.base=https://us.prairielearn.com/pl/api/v1
pl.course.instance.id=${PL_COURSE_INSTANCE_ID:213859}

# CORS – set CORS_ALLOWED_ORIGINS to restrict to specific domains in production
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# Swagger / SpringDoc
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.csrf.enabled=true

# Google OAuth2
# For properties defined with var=${SYMBOL:${env.SYMBOL}}, the SYMBOL value on
# the left is from environment variables; env.SYMBOL picks up values from .env
# (via spring-dotenv plugin).
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:${env.GOOGLE_CLIENT_ID:client_id_unset}}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:${env.GOOGLE_CLIENT_SECRET:client_secret_unset}}

# OAuth login URL exposed to the frontend via /api/systemInfo
app.oauth.login=${OAUTH_LOGIN:${env.OAUTH_LOGIN:/oauth2/authorization/google}}

# Comma-separated list of admin email addresses (no spaces)
app.admin.emails=${ADMIN_EMAILS:${env.ADMIN_EMAILS:phtcon@ucsb.edu}}

# Source repo URL (shown in system info)
app.sourceRepo=${SOURCE_REPO:${env.SOURCE_REPO:https://github.com/ucsb-cs156/proj-scaffold}}
