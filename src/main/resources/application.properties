# PostgreSQL datasource
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/scaffold}
spring.datasource.username=${DATABASE_USER:scaffold}
spring.datasource.password=${DATABASE_PASSWORD:scaffold}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server port
server.port=${PORT:8080}

# PrairieLearn API
pl.api.token=${PL_API_TOKEN:}
pl.api.base=https://us.prairielearn.com/pl/api/v1
pl.course.instance.id=${PL_COURSE_INSTANCE_ID:213859}
